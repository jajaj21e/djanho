{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-3">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% crispy form %}
    </form>
    <button class="btn btn-secondary mt-3" onclick="window.history.back()">Volver</button>
</div>
{% endblock %}
